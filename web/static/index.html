<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Lead Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header__brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="8" fill="url(#logo-grad)" />
            <path d="M10 22V10l6 6 6-6v12" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="logo-grad" x1="4" y1="4" x2="28" y2="28">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#a855f7"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <h1 class="header__title">Social Lead Monitor</h1>
          <p class="header__subtitle">Анализ постов из соцсетей</p>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="panel panel--input" aria-labelledby="fetch-heading">
        <h2 id="fetch-heading" class="visually-hidden">Загрузка видео</h2>

        <nav class="platforms" id="platform-tabs" aria-label="Платформы"></nav>

        <form id="fetch-form" class="fetch-form" novalidate>
          <label class="field">
            <span class="field__label">Ссылка на пост</span>
            <div class="field__row">
              <input
                id="url-input"
                class="field__input"
                type="url"
                name="url"
                placeholder="https://www.tiktok.com/@user/video/... или https://vt.tiktok.com/..."
                autocomplete="off"
                spellcheck="false"
                required
              />
              <button type="submit" class="btn btn--primary" id="submit-btn">
                <span class="btn__text">Получить данные</span>
                <span class="btn__spinner" hidden aria-hidden="true"></span>
              </button>
            </div>
            <span class="field__hint" id="platform-hint">Вставьте ссылку — платформа определится автоматически</span>
          </label>

          <div class="options">
            <label class="toggle">
              <input type="checkbox" id="show-browser" class="toggle__input" />
              <span class="toggle__track" aria-hidden="true">
                <span class="toggle__thumb"></span>
              </span>
              <span class="toggle__label">
                <strong>Показывать браузер</strong>
                <small>Открыть окно Chromium при загрузке (удобно для капчи)</small>
              </span>
            </label>
          </div>
        </form>
      </section>

      <div id="status" class="status" role="status" aria-live="polite" hidden></div>

      <section id="results" class="results" hidden aria-label="Результаты анализа"></section>

      <section id="empty-state" class="empty-state">
        <div class="empty-state__icon" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none">
            <rect x="8" y="12" width="48" height="40" rx="6" stroke="currentColor" stroke-width="2"/>
            <path d="M26 28l6 6 12-12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2 class="empty-state__title">Вставьте ссылку на пост</h2>
        <p class="empty-state__text">Данные по видео, автору, метрикам и комментариям появятся здесь</p>
      </section>
    </main>

    <footer class="footer">
      <span>Social Lead Monitor</span>
      <span class="footer__dot" aria-hidden="true">·</span>
      <span id="platform-count"></span>
    </footer>
  </div>

  <script src="/static/app.js" type="module"></script>
</body>
</html>
